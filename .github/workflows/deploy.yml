# =============================================================================
# GitHub Actions — Deploy to Production
# =============================================================================
# Runs on every push to main:
#   1. SSH into the server
#   2. Pull latest code
#   3. Create .env.production from GitHub Secrets
#   4. Run DB migrations (via temp Node container)
#   5. Rebuild Docker images & restart containers
#   6. Health check
#
# REQUIRED GITHUB SECRETS (set in repo Settings → Secrets and Variables → Actions):
#   SSH_HOST         — Server IP or domain
#   SSH_USER         — SSH username (e.g., root, deploy)
#   SSH_KEY          — Private SSH key (the whole file, BEGIN to END)
#   DB_ROOT_PASSWORD — MySQL root password
#   DB_PASSWORD      — MySQL app user password
#   DOMAIN           — Your domain (e.g., syllabus.yourdomain.com)
#
# CUSTOMIZE FOR YOUR PROJECT:
#   - Change PROJECT_DIR to match your server's repo path
#   - Change DB_NAME if your database has a different name
#   - Change COMPOSE_FILE if your compose file has a different name
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_DIR: ~/tqf3_for_testing              # 👈 Change to your repo folder on the server
  COMPOSE_FILE: docker-compose.prod.yml
  DB_NAME: syllabus_db              # 👈 Change to your database name

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "→ Navigating to project directory..."
            cd ${{ env.PROJECT_DIR }}

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Creating .env.production from GitHub secrets..."
            cat > .env.production << 'ENVEOF'
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ env.DB_NAME }}
            DOMAIN=${{ secrets.DOMAIN }}
            NODE_ENV=production
            ENVEOF

            echo "→ Running database migrations..."
            # The production container doesn't have npx/drizzle-kit,
            # so we run migrations from a temporary Node container
            docker run --rm \
              --network "$(basename $PWD)_internal" \
              -v $PWD:/app -w /app \
              node:20-alpine \
              sh -c "DATABASE_URL=mysql://appuser:${{ secrets.DB_PASSWORD }}@db:3306/${{ env.DB_NAME }} npx drizzle-kit migrate"

            echo "→ Rebuilding and restarting containers..."
            docker compose -f ${{ env.COMPOSE_FILE }} --env-file .env.production up -d --build

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "→ Waiting for health check..."
            sleep 15
            curl -sf --retry 5 --retry-delay 5 --retry-all-errors \
              https://${{ secrets.DOMAIN }}/api/health || {
              echo "⚠️  Health check failed — deployment may have issues"
              echo "→ Check logs: docker compose -f ${{ env.COMPOSE_FILE }} logs app --tail 50"
            }

            echo "✅ Deployment complete"
