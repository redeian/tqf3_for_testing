name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "→ Navigating to project directory..."
            cd ~/tqf3

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Creating .env.production from GitHub secrets..."
            cat > .env.production << 'ENVEOF'
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DOMAIN=${{ secrets.DOMAIN }}
            NODE_ENV=production
            ENVEOF

            echo "→ Running database migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm app \
              sh -c "npx drizzle-kit migrate"

            echo "→ Rebuilding and restarting containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "→ Waiting for health check..."
            sleep 15
            curl -sf --retry 5 --retry-delay 5 --retry-all-errors \
              https://${{ secrets.DOMAIN }}/api/health || {
              echo "⚠️  Health check failed — deployment may have issues"
              echo "→ Check logs: docker compose -f docker-compose.prod.yml logs app --tail 50"
            }

            echo "✅ Deployment complete"
