# =============================================================================
# GitHub Actions — CI (Continuous Integration)
# =============================================================================
# Runs on every push and PR to main:
#   1. Lint          — ESLint
#   2. Type check    — TypeScript (tsc --noEmit)
#   3. Unit tests    — Vitest
#   4. Build         — Next.js production build
#
# CUSTOMIZE FOR YOUR PROJECT:
#   - Change DB_NAME if your database has a different name
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DB_NAME: syllabus_db              # 👈 Change to your database name

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ${{ env.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/${{ env.DB_NAME }}

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/${{ env.DB_NAME }}
